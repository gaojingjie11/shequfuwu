version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./smartcomunity
      dockerfile: Dockerfile
    container_name: smartserver
    restart: always
    environment:
      - APP_ENV=prod
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET}
      - ALIYUN_FACEBODY_ENDPOINT=${ALIYUN_FACEBODY_ENDPOINT:-facebody.cn-shanghai.aliyuncs.com}
    network_mode: "host"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartfrontend
    restart: always
    network_mode: "host"
